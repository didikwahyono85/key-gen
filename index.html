<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>6‑Digit Key Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 20px;
      padding: 16px;
    }

    input {
      font-size: 22px;
      padding: 12px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 12px;
    }

    button {
      font-size: 22px;
      padding: 14px 20px;
    }

    #out {
      font-size: 32px;
      letter-spacing: 4px;
    }
  </style>
</head>

<body onload="loadCookie()">

<h2>6‑Digit Key Generator</h2>

<!-- Input 1: PASSWORD + COOKIE -->
<input
  id="in1"
  type="password"
  inputmode="numeric"
  placeholder="Input 1 (6 digits)"
  maxlength="6"
  oninput="saveCookie()"
>

<!-- Input 2: NORMAL -->
<input
  id="in2"
  inputmode="numeric"
  placeholder="Input 2 (6 digits)"
  maxlength="6"
>

<button onclick="generate()">Generate</button>

<p>Output:</p>
<p><strong><span id="out">------</span></strong></p>

<script>
// ---------- COOKIE HELPERS ----------
function setCookie(name, value, days) {
  const expires = new Date(Date.now() + days * 86400000).toUTCString();
  document.cookie = name + "=" + encodeURIComponent(value) +
    "; expires=" + expires + "; path=/";
}

function getCookie(name) {
  const cookies = document.cookie.split("; ");
  for (let c of cookies) {
    const [k, v] = c.split("=");
    if (k === name) return decodeURIComponent(v);
  }
  return "";
}

// ---------- LOAD LAST VALUE ----------
function loadCookie() {
  const lastIn1 = getCookie("lastInput1");
  if (lastIn1) {
    document.getElementById("in1").value = lastIn1;
  }
}

// ---------- SAVE ON CHANGE ----------
function saveCookie() {
  const val = document.getElementById("in1").value;
  if (val.length <= 6) {
    setCookie("lastInput1", val, 365);
  }
}

// ---------- KEY LOGIC ----------
function deriveKey(in1, in2) {
  if (in1.length !== 6 || in2.length !== 6) return "000000";

  let total = 0;
  for (let i = 0; i < 6; i++) {
    total += in1.charCodeAt(i) - 48;
    total += in2.charCodeAt(i) - 48;
  }

  const rot = total % 6;
  let mixed = [];

  for (let i = 0; i < 6; i++) {
    mixed[i] = (
      (in1.charCodeAt(i) - 48 +
       in2.charCodeAt(i) - 48 +
       rot) % 10
    ).toString();
  }

  const s = mixed.join("");
  return s.slice(rot) + s.slice(0, rot);
}

function generate() {
  const in1 = document.getElementById("in1").value;
  const in2 = document.getElementById("in2").value;

  document.getElementById("out").innerText =
    deriveKey(in1, in2);
}
</script>

</body>
</html>
