<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Key Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 20px;
      padding: 16px;
    }

    input {
      font-size: 22px;
      padding: 12px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 12px;
    }

    button {
      font-size: 22px;
      padding: 14px 20px;
    }

    p, span {
      font-size: 22px;
    }
  </style>
</head>

<body>

<h2>6‑Digit Key Generator</h2>

<input id="in1" placeholder="Input 1 (6 digits)" maxlength="6">
<input id="in2" placeholder="Input 2 (6 digits)" maxlength="6">

<button onclick="generate()">Generate</button>

<p>Output:</p>
<p><strong><span id="out">------</span></strong></p>

<script>
function deriveKey(in1, in2) {
  if (in1.length !== 6 || in2.length !== 6) return "000000";

  let total = 0;
  for (let i = 0; i < 6; i++) {
    total += in1.charCodeAt(i) - 48;
    total += in2.charCodeAt(i) - 48;
  }

  const rot = total % 6;
  let mixed = [];

  for (let i = 0; i < 6; i++) {
    mixed[i] = ((in1.charCodeAt(i) - 48 + in2.charCodeAt(i) - 48 + rot) % 10).toString();
  }

  const s = mixed.join("");
  return s.slice(rot) + s.slice(0, rot);
}

function generate() {
  document.getElementById("out").innerText =
    deriveKey(
      document.getElementById("in1").value,
      document.getElementById("in2").value
    );
}
</script>

</body>
</html>
